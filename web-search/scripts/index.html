/**
 * Web Search + Fetch skill for Google AI Edge Gallery Agent Mode.
 *
 * Search: Jina.ai Search API (s.jina.ai) via Authorization header
 * Fetch:  Jina.ai Reader API (r.jina.ai) with content extraction headers
 *
 * Domain exclusions are managed in blocked-domains.json (same directory
 * as this skill), fetched at runtime in parallel with the search request.
 *
 * @param {string} dataStr - JSON with: query (required), max_results (optional, 1-5, default 2)
 * @param {string} secret  - Jina.ai API key
 * @returns {string} JSON: { result: string } or { error: string }
 */
window['ai_edge_gallery_get_result'] = async (dataStr, secret) => {
  const MAX_CONTENT_CHARS = 1000;
  const SEARCH_BASE = 'https://s.jina.ai/';
  const READER_BASE = 'https://r.jina.ai/';

  // blocked-domains.json lives one directory above this script (skill root)
  const blockedDomainsUrl = new URL('../blocked-domains.json', window.location.href).href;

  const getDomain = url => {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch (_) { return ''; }
  };

  // Remove link markup and bullet lines from reader content.
  // Applied before slicing so MAX_CONTENT_CHARS is filled with body text only.
  const cleanContent = text => text
    .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1') // [text](url) → text
    .replace(/https?:\/\/\S+/g, '')           // bare URLs
    .replace(/^\[[^\]]+\]:\s+\S+.*$/gm, '')   // reference-style link defs
    .replace(/^\*.*$/gm, '')                  // lines starting with *
    .replace(/\n{3,}/g, '\n\n')
    .trim();

  try {
    const params = JSON.parse(dataStr);
    const query = (params.query || '').trim();
    if (!query) return JSON.stringify({ error: 'query is required.' });

    const maxResults = Math.min(Math.max(1, parseInt(params.max_results) || 2), 5);
    const apiKey = (typeof secret === 'string' ? secret : '').trim();

    // Search headers — minimal set to avoid unnecessary CORS preflight headers
    const searchHeaders = { 'Accept': 'application/json' };
    if (apiKey) searchHeaders['Authorization'] = `Bearer ${apiKey}`;

    // Reader headers — Jina content extraction options to reduce noise
    const readerHeaders = {
      ...searchHeaders,
      'X-Return-Format': 'markdown',
      'X-Retain-Images': 'none',
      'X-Remove-Selector': 'header, footer, nav, .ad, .ads, .advertisement, #sidebar, .sidebar, .navigation, .menu, .comments, .related, .share, .sns',
      'X-Timeout': '10',
    };

    // Start fetching blocked-domains.json in parallel with the search request.
    // Failure is non-fatal — if the file is unavailable, filtering is skipped.
    const blockedDomainsPromise = fetch(blockedDomainsUrl, { credentials: 'omit' })
      .then(r => r.json())
      .then(d => new Set(d.domains || []))
      .catch(() => new Set());

    // Step 1: Search
    let searchRes;
    try {
      searchRes = await fetch(SEARCH_BASE + encodeURIComponent(query), {
        headers: searchHeaders,
        credentials: 'omit',
      });
    } catch (netErr) {
      return JSON.stringify({
        error: `[NETWORK_ERROR] ${netErr.message} | apiKey set: ${!!apiKey}`
      });
    }

    if (!searchRes.ok) {
      return JSON.stringify({
        error: `[HTTP_${searchRes.status}] Search API returned error. ${
          searchRes.status === 401 ? 'API key missing or invalid.' :
          searchRes.status === 429 ? 'Rate limit exceeded.' : ''
        } | apiKey set: ${!!apiKey}`
      });
    }

    let searchData;
    try {
      const text = await searchRes.text();
      searchData = JSON.parse(text);
    } catch (parseErr) {
      return JSON.stringify({
        error: `[PARSE_ERROR] Search response was not valid JSON: ${parseErr.message}`
      });
    }

    // Wait for blocked-domains (already in-flight since search started)
    const blockedDomains = await blockedDomainsPromise;

    const hits = (searchData.data || [])
      .filter(hit => {
        const domain = getDomain(hit.url || '');
        return domain && !blockedDomains.has(domain);
      })
      .slice(0, maxResults);

    if (hits.length === 0) {
      return JSON.stringify({ result: 'No search results found for the given query.' });
    }

    // Step 2: Fetch full page content for each result in parallel
    const pages = await Promise.all(hits.map(async (hit) => {
      const title = hit.title || '(no title)';
      const url = hit.url || '';
      const fallbackContent = (hit.content || hit.description || '').slice(0, MAX_CONTENT_CHARS);

      if (!url) return { title, url, content: fallbackContent };

      try {
        const fetchRes = await fetch(READER_BASE + url, {
          headers: readerHeaders,
          credentials: 'omit',
        });
        if (!fetchRes.ok) return { title, url, content: fallbackContent };
        const fetchData = await fetchRes.json();
        const content = (cleanContent(fetchData.data?.content || '') || fallbackContent).slice(0, MAX_CONTENT_CHARS);
        return { title, url, content };
      } catch (_) {
        return { title, url, content: fallbackContent };
      }
    }));

    const output = pages
      .map((p, i) => `## [${i + 1}] ${p.title}\nSource: ${p.url}\n\n${p.content}`)
      .join('\n\n---\n\n');

    return JSON.stringify({ result: output });

  } catch (e) {
    return JSON.stringify({ error: `[UNEXPECTED] ${e.message}` });
  }
};
</script>
</body>
</html>
