/**
 * Web Search + Fetch skill for Google AI Edge Gallery Agent Mode.
 *
 * Search: Jina.ai Search API (s.jina.ai) via Authorization header
 * Fetch:  Jina.ai Reader API (r.jina.ai)
 *
 * @param {string} dataStr - JSON with: query (required), max_results (optional, 1-5, default 2)
 * @param {string} secret  - Jina.ai API key
 * @returns {string} JSON: { result: string } or { error: string }
 */
window['ai_edge_gallery_get_result'] = async (dataStr, secret) => {
  const MAX_CONTENT_CHARS = 2000;
  const SEARCH_BASE = 'https://s.jina.ai/';
  const READER_BASE = 'https://r.jina.ai/';

  try {
    const params = JSON.parse(dataStr);
    const query = (params.query || '').trim();
    if (!query) return JSON.stringify({ error: 'query is required.' });

    const maxResults = Math.min(Math.max(1, parseInt(params.max_results) || 2), 5);
    const apiKey = (typeof secret === 'string' ? secret : '').trim();

    const headers = { 'Accept': 'application/json' };
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

    // Step 1: Search
    // Separate try/catch to distinguish CORS/network errors from HTTP errors.
    let searchRes;
    try {
      searchRes = await fetch(SEARCH_BASE + encodeURIComponent(query), {
        headers,
        credentials: 'omit',
      });
    } catch (netErr) {
      // "Failed to fetch" here usually means a CORS preflight was blocked,
      // or the device has no network access.
      return JSON.stringify({
        error: `[NETWORK_ERROR] ${netErr.message} | apiKey set: ${!!apiKey}`
      });
    }

    if (!searchRes.ok) {
      // Request reached the server — not a CORS issue.
      return JSON.stringify({
        error: `[HTTP_${searchRes.status}] Search API returned error. ${
          searchRes.status === 401 ? 'API key missing or invalid.' :
          searchRes.status === 429 ? 'Rate limit exceeded.' : ''
        } | apiKey set: ${!!apiKey}`
      });
    }

    // Step 2: Parse response
    let searchData;
    try {
      const text = await searchRes.text();
      searchData = JSON.parse(text);
    } catch (parseErr) {
      return JSON.stringify({
        error: `[PARSE_ERROR] Search response was not valid JSON: ${parseErr.message}`
      });
    }

    const hits = (searchData.data || []).slice(0, maxResults);
    if (hits.length === 0) {
      return JSON.stringify({ result: 'No search results found for the given query.' });
    }

    // Step 3: Fetch full page content for each result in parallel
    const pages = await Promise.all(hits.map(async (hit) => {
      const title = hit.title || '(no title)';
      const url = hit.url || '';
      const fallbackContent = (hit.content || hit.description || '').slice(0, MAX_CONTENT_CHARS);

      if (!url) return { title, url, content: fallbackContent };

      try {
        const fetchRes = await fetch(READER_BASE + url, {
          headers,
          credentials: 'omit',
        });
        if (!fetchRes.ok) return { title, url, content: fallbackContent };
        const fetchData = await fetchRes.json();
        const content = (fetchData.data?.content || fallbackContent).slice(0, MAX_CONTENT_CHARS);
        return { title, url, content };
      } catch (_) {
        return { title, url, content: fallbackContent };
      }
    }));

    const output = pages
      .map((p, i) => `## [${i + 1}] ${p.title}\nSource: ${p.url}\n\n${p.content}`)
      .join('\n\n---\n\n');

    return JSON.stringify({ result: output });

  } catch (e) {
    return JSON.stringify({ error: `[UNEXPECTED] ${e.message}` });
  }
};
</script>
